<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i18n-pro | Demo</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
        }

        .nav {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }

        .lang-switch {
            margin-top: 2rem;
            display: flex;
            gap: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            background: white;
        }

        button.active {
            background: #333;
            color: white;
            border-color: #333;
        }

        h1 {
            margin: 0 0 1rem;
        }

        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="nav">
        <a href="#" data-i18n="nav.home">Home</a>
        <a href="#" data-i18n="nav.about">About</a>
        <a href="#" data-i18n="nav.contact">Contact</a>
    </div>

    <div class="card">
        <h1 data-i18n="hero.title">Welcome to i18n-pro</h1>
        <p data-i18n="hero.subtitle">A lightweight, AI-friendly translation system for any web project.</p>
    </div>

    <div class="lang-switch">
        <button onclick="changeLang('en')" id="btn-en">English</button>
        <button onclick="changeLang('fr')" id="btn-fr">Français</button>
    </div>

    <script type="module">
        import { initI18n, loadLanguage, getCurrentLang } from './lib/i18n.js';

        async function start() {
            await initI18n({ mode: 'static', localesDir: '/locales' });
            updateButtons();
        }

        window.changeLang = async (lang) => {
            await loadLanguage(lang);
            updateButtons();
        };

        function updateButtons() {
            const current = getCurrentLang();
            document.getElementById('btn-en').classList.toggle('active', current === 'en');
            document.getElementById('btn-fr').classList.toggle('active', current === 'fr');
        }

        start();
    </script>
</body>

</html>
